services:
  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    container_name: cheroki-telegram-api
    restart: unless-stopped
    # --local: file_path에 HTTP URL 대신 서버 절대 경로를 돌려준다.
    #           bot.download()가 그 경로를 읽어 복사하므로 호스트·컨테이너 간
    #           파일 시스템 공유가 전제. 아래 bind mount + user uid 정합.
    command:
      - --local
      - --http-port=8081
      - --api-id=${TELEGRAM_API_ID}
      - --api-hash=${TELEGRAM_API_HASH}
      - --dir=/var/lib/telegram-bot-api
      - --temp-dir=/tmp/telegram-bot-api
      - --verbosity=1
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
    # bind mount: 호스트 경로와 컨테이너 경로가 같은 실체.
    # 호스트 쪽 봇 프로세스(uid 1000)가 파일을 읽고 복사해야 하므로
    # 아래 user와 정합을 맞춰 컨테이너도 동일 uid로 쓰게 한다.
    volumes:
      - ./data/tg-api:/var/lib/telegram-bot-api
    user: "${UID:-1000}:${GID:-1000}"
    # 외부 노출 금지. 봇이 같은 호스트의 localhost로만 접근한다.
    ports:
      - "127.0.0.1:8081:8081"
